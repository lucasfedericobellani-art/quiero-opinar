<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel privado · Quiero Opinar</title>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-card" id="loginView" aria-labelledby="loginTitle">
        <p class="section-label">acceso restringido</p>
        <h1 id="loginTitle">Panel de moderacion</h1>
        <p class="admin-copy">Esta zona no se muestra en la navegacion publica. Solo el administrador puede entrar con credenciales validas.</p>
        <form class="admin-login-form" id="adminLoginForm">
          <label class="field-label" for="adminEmail">Email</label>
          <input id="adminEmail" name="adminEmail" type="email" autocomplete="username" required>
          <label class="field-label" for="adminPassword">Password</label>
          <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" required>
          <button class="primary-button" type="submit">Entrar</button>
          <p class="admin-error" id="loginError" role="alert"></p>
        </form>
      </section>

      <section class="admin-card hidden" id="adminView" aria-labelledby="adminTitle">
        <div class="admin-toolbar">
          <div>
            <p class="section-label">moderacion</p>
            <h1 id="adminTitle">Gestionar opiniones</h1>
          </div>
          <div class="admin-toolbar-actions">
            <button class="ghost-button" id="refreshButton" type="button">Actualizar</button>
            <button class="ghost-button" id="logoutButton" type="button">Cerrar sesion</button>
          </div>
        </div>
        <p class="admin-copy" id="adminSummary">Cargando opiniones...</p>
        <form class="admin-search-form" id="adminSearchForm" role="search">
          <label class="sr-only" for="adminSearchInput">Buscar opiniones</label>
          <input id="adminSearchInput" class="admin-search-input" type="search" placeholder="Buscar por opinion #, palabra o IP" autocomplete="off">
        </form>
        <div class="admin-list" id="adminOpinionList"></div>
      </section>
    </main>

    <script src="firebase-config.js"></script>
    <script src="admin.js" type="module"></script>
  </body>
</html>
