<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Panel privado · Quiero Opinar</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-card">
        <p class="section-label">acceso restringido</p>
        <h1>Panel de moderacion</h1>
        <p class="admin-copy">Esta zona solo es para el administrador. No aparece en la navegacion publica.</p>
        <form class="admin-login-form" id="panelLoginForm">
          <label class="field-label" for="panelUsername">Usuario</label>
          <input id="panelUsername" name="panelUsername" type="text" autocomplete="username" required>
          <label class="field-label" for="panelPassword">Contraseña</label>
          <input id="panelPassword" name="panelPassword" type="password" autocomplete="current-password" required>
          <button class="primary-button" type="submit">Entrar</button>
          <p class="admin-error" id="panelError"></p>
        </form>
      </section>
    </main>
    <script>
      const username = 'admin';
      const password = 'quiero-opinar2026';
      const form = document.querySelector('#panelLoginForm');
      const error = document.querySelector('#panelError');
      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const enteredUser = document.querySelector('#panelUsername').value.trim();
        const enteredPass = document.querySelector('#panelPassword').value;
        if (enteredUser === username && enteredPass === password) {
          window.location.href = 'admin.html';
        } else {
          error.textContent = 'Credenciales invalidas.';
        }
      });
    </script>
  </body>
</html>
